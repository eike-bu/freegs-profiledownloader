name: Build Windows (GitHub)
# CI / GitHub Actions — Windows Build (NSIS installer + standalone .exe)
# Trigger: push on v* tags or manual workflow_dispatch
# Use this for automated GitHub Release builds.
# For local Windows builds, see: build-local-windows.ps1
on:
  workflow_dispatch:  # manual trigger only
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install frontend deps
        run: npm install

      - name: Build app
        run: cargo tauri build --bundles nsis

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: FreeGS-Setup
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload standalone binary
        uses: actions/upload-artifact@v4
        with:
          name: freegs-app-windows
          path: src-tauri/target/release/freegs-app.exe