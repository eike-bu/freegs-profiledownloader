name: Build Linux (GitHub)
# CI / GitHub Actions — Linux Build (AppImage + standalone binary)
# Trigger: push on v* tags or manual workflow_dispatch
# Use this for automated GitHub Release builds.
# For local Linux builds, run: cargo tauri build --bundles appimage
on:
  workflow_dispatch:  # manual trigger only
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install frontend deps
        run: npm install

      - name: Build app
        run: cargo tauri build --bundles appimage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: FreeGS-Profile-Downloader
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload standalone binary
        uses: actions/upload-artifact@v4
        with:
          name: freegs-app-linux
          path: src-tauri/target/release/freegs-app
